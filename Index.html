<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerador de Templates WhatsApp</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
  body {
    background: linear-gradient(135deg, #075e54 0%, #128c7e 50%, #25d366 100%);
    min-height: 100vh; padding: 20px; color: #333;
  }
  .container {
    max-width: 1100px; margin: 0 auto;
    background: #fff; border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
  }
  header {
    background: #075e54; color: white; padding: 25px 30px;
    display: flex; align-items: center; gap: 15px;
  }
  header h1 { font-size: 1.6rem; }
  header p { opacity: 0.85; font-size: 0.9rem; margin-top: 4px; }
  .content { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  @media (max-width: 850px) { .content { grid-template-columns: 1fr; } }

  .form-area { padding: 30px; background: #f7f9fa; border-right: 1px solid #e0e0e0; }
  .preview-area { padding: 30px; background: #e5ddd5; }

  label { display: block; font-weight: 600; margin-bottom: 6px; color: #075e54; font-size: 0.9rem; }
  select, input {
    width: 100%; padding: 11px 14px; border: 2px solid #ddd;
    border-radius: 8px; font-size: 0.95rem; margin-bottom: 16px;
    transition: border 0.2s;
  }
  select:focus, input:focus { border-color: #25d366; outline: none; }

  .template-selector {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px;
  }
  .template-btn {
    padding: 10px; border: 2px solid #ddd; background: white;
    border-radius: 8px; cursor: pointer; font-size: 0.85rem;
    transition: all 0.2s; text-align: left;
  }
  .template-btn:hover { border-color: #25d366; }
  .template-btn.active {
    background: #075e54; color: white; border-color: #075e54;
  }

  .preview-box {
    background: #dcf8c6; padding: 18px; border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1); font-size: 0.95rem;
    line-height: 1.6; white-space: pre-wrap; word-wrap: break-word;
    min-height: 300px; position: relative;
  }
  .preview-box strong { font-weight: 700; }
  .preview-box em { font-style: italic; }

  .actions { display: flex; gap: 10px; margin-top: 15px; }
  button.action {
    flex: 1; padding: 12px; border: none; border-radius: 8px;
    font-weight: 600; cursor: pointer; font-size: 0.95rem;
    transition: transform 0.1s;
  }
  button.action:hover { transform: translateY(-2px); }
  .btn-copy { background: #25d366; color: white; }
  .btn-copy-raw { background: #075e54; color: white; }
  .btn-clear { background: #e0e0e0; color: #333; }

  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: #075e54; color: white; padding: 12px 25px;
    border-radius: 30px; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; font-weight: 600;
  }
  .toast.show { opacity: 1; }

  .section-title {
    font-size: 1rem; color: #075e54; margin-bottom: 12px;
    padding-bottom: 6px; border-bottom: 2px solid #25d366;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div style="font-size: 2rem;">💬</div>
    <div>
      <h1>Gerador de Templates WhatsApp</h1>
      <p>Preencha os dados e copie a mensagem pronta</p>
    </div>
  </header>

  <div class="content">
    <!-- FORMULÁRIO -->
    <div class="form-area">
      <div class="section-title">1️⃣ Escolha o Template</div>
      <div class="template-selector">
        <button class="template-btn active" data-tpl="lembrete">📅 Lembrete 3 dias</button>
        <button class="template-btn" data-tpl="hoje">⏳ Vence Hoje</button>
        <button class="template-btn" data-tpl="suspensao">⚠️ Suspensão</button>
        <button class="template-btn" data-tpl="confirmacao">✅ Confirmação</button>
        <button class="template-btn" data-tpl="bemvindo" style="grid-column: span 2;">🎉 Bem-vindo / Cadastro</button>
      </div>

      <div class="section-title">2️⃣ Preencha os Dados</div>
      <label for="nome">Nome do Cliente</label>
      <input type="text" id="nome" placeholder="Ex: João Silva" value="João Silva">

      <label for="tipo">Tipo / Produto</label>
      <input type="text" id="tipo" placeholder="Ex: Plano Premium Mensal" value="Plano Premium Mensal">

      <label for="dataVenc">Data de Vencimento</label>
      <input type="date" id="dataVenc">

      <label for="valor">Valor (R$)</label>
      <input type="text" id="valor" placeholder="Ex: 29,90" value="29,90">

      <label for="chavePix">Chave PIX</label>
      <input type="text" id="chavePix" placeholder="Ex: contato@empresa.com" value="contato@empresa.com">
    </div>

    <!-- PREVIEW -->
    <div class="preview-area">
      <div class="section-title">👁️ Pré-visualização</div>
      <div class="preview-box" id="preview"></div>

      <div class="actions">
        <button class="action btn-copy" onclick="copiarFormatado()">📋 Copiar Formatado</button>
        <button class="action btn-copy-raw" onclick="copiarRaw()">📄 Copiar Raw</button>
      </div>
      <div class="actions">
        <button class="action btn-clear" onclick="limparCampos()">🗑️ Limpar Campos</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">Copiado!</div>

<script>
const templates = {
  lembrete: `✅ *Lembrete de Renovação - {tipo}*

Olá, *{nome}*.

Informamos que o seu acesso ao serviço {tipo} vence em 3 dias ({dataVenc}).

Valor: R$ {valor}
🔗 *PIX:*
{chavePix}

👉 _Aviso: Após realizar o pagamento, envie o comprovante para este WhatsApp._`,

  hoje: `⏳ *Vencimento Hoje - {tipo}*

Olá, *{nome}*.

Seu acesso ao {tipo} vence hoje. Seguem os dados para renovação imediata:

Valor: R$ {valor}
Vencimento: {dataVenc}
🔗 *PIX:*
{chavePix}

👉 _Aviso: Para evitar a suspensão do sinal, por favor envie o comprovante após o pagamento._`,

  suspensao: `⚠️ *Aviso de Suspensão - {tipo}*

Olá, *{nome}*.

Identificamos que a sua assinatura do plano {tipo} expirou e o sinal foi suspenso. Para reativar agora, utilize os dados abaixo:

Valor: R$ {valor}
Vencido em: {dataVenc}
🔗 *PIX:*
{chavePix}

👉 *Atenção:* Assim que enviar o comprovante de pagamento, o sistema processará a reativação automática.`,

  confirmacao: `✅ *Pagamento Confirmado!*

Olá, *{nome}* 

Recebemos o pagamento do seu pedido *{tipo}* com sucesso 

💰 Valor pago: *R$ {valor}*

Seu pagamento já foi confirmado e agradecemos pela preferência!

Esperamos que você ame seus produtos!`,

  bemvindo: `✅ *Pedido Realizado com Sucesso!*

Olá, *{nome}* 

Seu pedido foi realizado com sucesso 🛍️

📦 *Resumo do Pedido:*
Produto: {tipo}
💰 Valor: R$ {valor}
📅 Vencimento: {dataVenc}

🔗 *PIX:*
{chavePix}
Ficamos muito felizes em ter você conosco!`
};

let templateAtual = 'lembrete';

// Formata data para dd/mm/aaaa
function formatarData(data) {
  if (!data) return '---';
  const [y, m, d] = data.split('-');
  return `${d}/${m}/${y}`;
}

function gerarMensagem() {
  const dados = {
    nome: document.getElementById('nome').value || '{nome}',
    tipo: document.getElementById('tipo').value || '{tipo}',
    dataVenc: formatarData(document.getElementById('dataVenc').value),
    valor: document.getElementById('valor').value || '{valor}',
    chavePix: document.getElementById('chavePix').value || '{chavePix}'
  };

  let msg = templates[templateAtual];
  for (const chave in dados) {
    msg = msg.replace(new RegExp(`\\{${chave}\\}`, 'g'), dados[chave]);
  }
  return msg;
}

function renderPreview() {
  const msg = gerarMensagem();
  // Converte *texto* em <strong> e _texto_ em <em> para visualização
  const html = msg
    .replace(/\*([^*]+)\*/g, '<strong>$1</strong>')
    .replace(/_([^_]+)_/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
  document.getElementById('preview').innerHTML = html;
}

function showToast(texto) {
  const t = document.getElementById('toast');
  t.textContent = texto;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function copiarFormatado() {
  const msg = gerarMensagem();
  navigator.clipboard.writeText(msg).then(() => showToast('✅ Copiado! Cole no WhatsApp'));
}

function copiarRaw() {
  const msg = gerarMensagem();
  navigator.clipboard.writeText(msg).then(() => showToast('📄 Texto bruto copiado'));
}

function limparCampos() {
  ['nome','tipo','dataVenc','valor','chavePix'].forEach(id => {
    document.getElementById(id).value = '';
  });
  renderPreview();
}

// Seleção de template
document.querySelectorAll('.template-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.template-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    templateAtual = btn.dataset.tpl;
    renderPreview();
  });
});

// Atualização em tempo real
document.querySelectorAll('input').forEach(inp => {
  inp.addEventListener('input', renderPreview);
});

// Data padrão: 3 dias a partir de hoje
const hoje = new Date();
hoje.setDate(hoje.getDate() + 3);
document.getElementById('dataVenc').value = hoje.toISOString().split('T')[0];

renderPreview();
</script>
</body>
</html>
